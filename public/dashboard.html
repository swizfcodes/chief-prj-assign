<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- Dark Mode Toggle -->
  <div class="top-bar">
    <img src="/photos/OCDA-Logo.jpg" alt="OCDA">
    <button class="toggle-btn" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
    <button class="dark-toggle" onclick="toggleDarkMode()">
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar collapsed" id="sidebar">
    <div class="sidebar-buttons">
      <button onclick="showSection('profileSection')">
        <i class="fas fa-user-circle"></i> <span>My Profile</span>
      </button>
      <button onclick="showReceipts()">
        <i class="fas fa-receipt"></i> <span>My Receipts</span>
      </button>
      <button onclick="toggleEnquiry()">
        <i class="fas fa-question-circle"></i> <span>Enquiries</span>
      </button>
      <button onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
      </button>
    </div>
  </div>

  <div class="main">
    <section id="profileSection">
      <h1>Welcome, <span id="username"></span></h1>
      <h2>My Profile</h2>

      <!-- Display Section -->
      <div id="profileDisplay">
        <p><strong>Phone 1:</strong> <span id="phone"></span></p>
        <p><strong>Phone 2:</strong> <span id="phoneNo2"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>State:</strong> <span id="state"></span></p>
        <p><strong>Ward:</strong> <span id="ward"></span></p>
        <p><strong>Quarters:</strong> <span id="quarters"></span></p>
        <p><strong>Town:</strong> <span id="town"></span></p>
        <p><strong>Age:</strong> <span id="age"></span></p>
        <p><strong>Title:</strong> <span id="title"></span></p>
        <p><strong>Honorary Title:</strong> <span id="honTitle"></span></p>
        <p><strong>Qualifications:</strong> <span id="qualifications"></span></p>
        <p><strong>Exit Date:</strong> <span id="exitDate"></span></p>
        <button onclick="toggleEdit(true)">Edit Profile</button>
      </div>

      <!-- Edit Section -->
      <div id="profileEditForm" style="display:none">
        <!-- Phone Numbers -->
        <div class="form-row">
          <div class="form-group">
              <label for="phoneNumber">Phone Number</label>
              <input type="tel" id="phone" name="phoneNumber">
          </div>
          <div class="form-group">
              <label for="phoneNo2">Secondary Phone</label>
              <input type="tel" id="phoneNo2" name="phoneNo2">
          </div>
        </div>

        <!-- Email + sex -->
        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">
          </div>
          <div class="form-group">
            <label for="sex">Sex</label>
            <select id="sex" name="sex"> 
              <option value="">Select Sex</option>
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
            <div class="error" id="sexError"></div>
          </div>
        </div>
      
          <!--Quaters + State -->
        <div class="form-row">
          <div class="form-group">
            <label for="quarters">Quarters</label>
            <select id="quarters" name="quarters"> 
              <option value="">Select Quaters</option>
              <option value="Ogunna">Ogunna</option>
              <option value="Ogosi">Ogosi</option>
              <option value="Ogotun">Ogotun</option>
            </select>
            <div class="error" id="quartersError"></div>
          </div>
          <!-- State -->
          <div class="form-group">
            <label for="state">State</label>
            <select id="state" name="state"> 
              <option value="">Select State</option>
              <option value="Abia">Abia</option>
              <option value="Adamawa">Adamawa</option>
              <option value="Akwa Ibom">Akwa Ibom</option>
              <option value="Anambra">Anambra</option>
              <option value="Bauchi">Bauchi</option>
              <option value="Bayelsa">Bayelsa</option>
              <option value="Benue">Benue</option>
              <option value="Borno">Borno</option>
              <option value="Cross River">Cross River</option>
              <option value="Delta">Delta</option>
              <option value="Ebonyi">Ebonyi</option>
              <option value="Edo">Edo</option>
              <option value="Ekiti">Ekiti</option>
              <option value="Enugu">Enugu</option>
              <option value="FCT">FCT</option>
              <option value="Gombe">Gombe</option>
              <option value="Imo">Imo</option>
              <option value="Jigawa">Jigawa</option>
              <option value="Kaduna">Kaduna</option>
              <option value="Kano">Kano</option>
              <option value="Katsina">Katsina</option>
              <option value="Kebbi">Kebbi</option>
              <option value="Kogi">Kogi</option>
              <option value="Kwara">Kwara</option>
              <option value="Lagos">Lagos</option>
              <option value="Nasarawa">Nasarawa</option>
              <option value="Niger">Niger</option>
              <option value="Ogun">Ogun</option>
              <option value="Ondo">Ondo</option>
              <option value="Osun">Osun</option>
              <option value="Oyo">Oyo</option>
              <option value="Plateau">Plateau</option>
              <option value="Rivers">Rivers</option>
              <option value="Sokoto">Sokoto</option>
              <option value="Taraba">Taraba</option>
              <option value="Yobe">Yobe</option>
              <option value="Zamfara">Zamfara</option>
            </select>
            <div class="error" id="stateError"></div>
          </div>
        </div>

        <!-- Row: Ward + Town -->
        <div class="form-row">
          <div class="form-group">
            <label for="ward">Ward </label>
            <select id="ward" name="ward" required> 
              <option value="">Select Ward</option>
              <option value="Awanji">Awanji</option>
              <option value="Ayagama">Ayagama</option>
              <option value="Ayasu/Ayaya">Ayasu/Ayaya</option>
              <option value="Igoho">Igoho</option>
              <option value="Igonu">Igonu</option>
              <option value="Igukan">Igukan</option>
              <option value="IkanOlotu">IkanOlotu</option>
              <option value="Okoko">Okoko</option>
              <option value="Uhon">Uhon</option>
            </select>
            <div class="error" id="wardError"></div>
          </div>
          <div class="form-group">
            <label for="town">Town</label>
            <input type="text" id="town" name="town">
            <div class="error" id="townError"></div>
          </div>
        </div>

        <!-- Row: Title + HonTitle -->
        <div class="form-row">
          <div class="form-group">
            <label for="title">Title</label>
            <select id="title" name="title"> 
              <option value="">Select Title</option>
              <option value="Alhaji">Alhaji</option>
              <option value="Brig/Gen">Brig/Gen</option>
              <option value="Chief">Chief</option>
              <option value="Dr">Dr</option>
              <option value="Engr">Engr</option>
              <option value="Mr">Mr</option>
              <option value="Mrs">Mrs</option>
              <option value="Miss">Miss</option>
              <option value="Oba">Oba</option>
              <option value="R/Adm">R/Adm</option>
            </select>
          </div>

          <div class="form-group">
            <label for="honTitle">Honorary Title</label>
            <select id="honTitle" name="honTitle"> 
              <option value="">Select Honorary Title</option>
              <option value="AJAKA">AJAKA</option>
              <option value="BALOGUN">BALOGUN</option>
              <option value="Chief">Chief</option>
              <option value="ELEBIRA">ELEBIRA</option>
              <option value="ELEJOFI">ELEJOFI</option>
              <option value="IGBEDI">IGBEDI</option>
              <option value="KABIYESI">KABIYESI</option>              
              <option value="Miss">Miss</option>
              <option value="Mr">Mr</option>
              <option value="Mrs">Mrs</option>
              <option value="ODEMO">ODEMO</option>
              <option value="ODOFIN">ODOFIN</option>
              <option value="OJOMU">OJOMU</option>
              <option value="OLORIEGBE">OLORIEGBE</option>
              <option value="OLUGOTUN">OLUGOTUN</option>
              <option value="OLUSA">OLUSA</option>
              <option value="OSUNLA">OSUNLA</option>
            </select>
          </div>
        </div>

        <!-- Row: Qualifications + Profession -->
        <div class="form-row">
          <div class="form-group">
            <label for="qualifications">Qualification</label>
            <select id="qualifications" name="qualifications"> 
              <option value="">Select Qualification</option>
              <option value="BSC">BSC</option>
              <option value="Diploma">Diploma</option>
              <option value="HND">HND</option>
              <option value="MSC">MSC</option>
              <option value="NCE">NCE</option>
              <option value="OND">OND</option>
              <option value="PHD">PHD</option>
              <option value="SCert">SCert</option>
            </select>
          </div>
          <div class="form-group">
            <label for="profession">Profession</label>
            <input type="text" id="profession" name="profession">
          </div>
        </div>

        <!-- Exit Date + age -->
        <div class="form-row">
          <div class="form-group">
            <label for="exitDate">Exit Date</label>
            <input type="date" id="exitDate" name="exitDate">
          </div>

          <div class="form-group">
            <label><strong>Age:</strong></label>
            <input id="age" disabled />
          </div>
        </div>

        <button onclick="updateProfile()" class="submit-btn">Save Changes</button>
        <button onclick="toggleEdit(false)" class="btn-secondary">Cancel</button>
      </div>
    </section>

    <section id="receiptSection" class="hidden">
      <h2>My Receipts</h2>

      <div class="receipt-filters">
        <label>From: <input type="date" id="fromDate"></label>
        <label>To: <input type="date" id="toDate"></label>
        <div class="receipt-buttons">
          <button onclick="filterReceipts()">Apply</button>
          <button onclick="printReceiptsPDF()">Print / Export</button>
          <button onclick="exportReceiptsToCSV()">Export CSV</button>
        </div>
      </div>

      <div id="receiptTable"></div>

      <button onclick="clearReceipts()" class="btn-secondary">Close</button>
    </section>

    <section id="enquirySection" class="hidden">
      <h2 style="text-align:center;">Enquiries</h2>

      <div class="enquiry-tabs">
        <label>
          <input type="radio" name="filterType" value="ward" checked onchange="toggleDropdown()">
          <span>Ward</span>
        </label>
        <label>
          <input type="radio" name="filterType" value="quarters" onchange="toggleDropdown()">
          <span>Quarters</span>
        </label>
      </div>

      <div class="select-wrap">
        <select id="wardSelect"></select>
        <select id="quartersSelect" class="hidden"></select>
      </div>

      <div id="enquiryResults">Select a ward or quarters to begin.</div>

      <button onclick="clearReceipts()" class="btn-secondary">Close</button>
    </section>
  </div>

</body>
<script src="script/dashboard.js"></script>
</html>
